kind = "web"
previewPath = "/"
title = "biyaHERO"
version = "1.0.0"
id = "artifacts/biyahero"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22466

[services.development]
run = "pnpm --filter @workspace/biyahero run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/biyahero", "run", "build" ]
publicDir = "artifacts/biyahero/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22466"
BASE_PATH = "/"
